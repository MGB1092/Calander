<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>함께 캘린더</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');

    :root {
      --indigo: #3B3F8C;
      --indigo-light: #5A5FBF;
      --lavender: #EEF0FF;
      --mint: #4ECDC4;
      --mint-light: #E0F7F6;
      --white: #FFFFFF;
      --gray-1: #F7F8FC;
      --gray-2: #E8EAF2;
      --gray-3: #9EA3C0;
      --gray-4: #5C6080;
      --text: #1E2040;
      --radius: 16px;
      --shadow: 0 4px 20px rgba(59,63,140,0.10);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--lavender);
      color: var(--text);
      min-height: 100vh;
      max-width: 430px;
      margin: 0 auto;
      position: relative;
    }

    /* HEADER */
    .header {
      background: var(--white);
      padding: 20px 20px 16px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 12px rgba(59,63,140,0.07);
    }
    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .app-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--indigo);
      letter-spacing: -0.5px;
    }
    .app-title span { color: var(--mint); }
    .share-btn {
      background: var(--indigo);
      color: white;
      border: none;
      border-radius: 20px;
      padding: 7px 14px;
      font-size: 13px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    /* MONTH NAV */
    .month-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .month-label {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
    }
    .nav-btn {
      background: var(--lavender);
      border: none;
      width: 32px; height: 32px;
      border-radius: 50%;
      font-size: 16px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--indigo);
      font-weight: bold;
    }
    .nav-btn:active { background: var(--gray-2); }

    /* WEEKDAY LABELS */
    .weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      padding: 10px 12px 0;
      background: var(--white);
    }
    .weekday {
      text-align: center;
      font-size: 11px;
      font-weight: 500;
      color: var(--gray-3);
      padding-bottom: 6px;
    }
    .weekday.sun { color: #E05C5C; }
    .weekday.sat { color: #5C7AE0; }

    /* CALENDAR GRID */
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      background: var(--white);
      padding: 4px 12px 12px;
      gap: 2px;
    }
    .day-cell {
      min-height: 60px;
      padding: 4px 2px;
      cursor: pointer;
      border-radius: 10px;
      transition: background 0.15s;
      position: relative;
    }
    .day-cell:active { background: var(--lavender); }
    .day-num {
      font-size: 13px;
      font-weight: 500;
      text-align: center;
      width: 24px; height: 24px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%;
      margin: 0 auto 2px;
    }
    .day-cell.today .day-num {
      background: var(--indigo);
      color: white;
    }
    .day-cell.other-month .day-num { color: var(--gray-2); }
    .day-cell.sun .day-num { color: #E05C5C; }
    .day-cell.sat .day-num { color: #5C7AE0; }
    .day-cell.holiday .day-num { color: #E05C5C; }
    .day-cell.today.sun .day-num,
    .day-cell.today.sat .day-num,
    .day-cell.today.holiday .day-num { color: white; }

    /* HOLIDAY LABEL */
    .holiday-label {
      font-size: 8px;
      color: #E05C5C;
      text-align: center;
      line-height: 1.2;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      max-width: 100%;
      padding: 0 1px;
      font-weight: 600;
    }
    .day-cell.other-month .holiday-label { color: #e8a0a0; }

    /* SYNC INDICATOR */
    .sync-badge {
      font-size: 10px;
      color: var(--mint);
      display: flex;
      align-items: center;
      gap: 4px;
      font-weight: 500;
    }
    .sync-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--mint);
    }
    .sync-dot.offline { background: var(--gray-3); }

    /* EVENT DOTS */
    .event-dots {
      display: flex;
      flex-wrap: wrap;
      gap: 2px;
      justify-content: center;
      padding: 0 2px;
    }
    .event-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
    }

    /* SECTION */
    .section {
      padding: 16px 16px 8px;
    }
    .section-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--gray-4);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 10px;
    }

    /* EVENT LIST */
    .event-list { display: flex; flex-direction: column; gap: 8px; }
    .event-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 14px 16px;
      box-shadow: var(--shadow);
      display: flex;
      align-items: flex-start;
      gap: 12px;
      cursor: pointer;
      transition: transform 0.15s;
    }
    .event-card:active { transform: scale(0.98); }
    .event-color-bar {
      width: 4px;
      min-height: 40px;
      border-radius: 4px;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .event-info { flex: 1; }
    .event-title-text {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 4px;
    }
    .event-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .event-name-tag {
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 10px;
      color: white;
    }
    .event-time {
      font-size: 12px;
      color: var(--gray-3);
    }
    .event-desc {
      font-size: 12px;
      color: var(--gray-3);
      margin-top: 4px;
    }
    .event-delete {
      background: none;
      border: none;
      color: var(--gray-3);
      font-size: 18px;
      cursor: pointer;
      padding: 4px;
      line-height: 1;
    }
    .empty-state {
      text-align: center;
      padding: 30px 0;
      color: var(--gray-3);
      font-size: 14px;
    }
    .empty-icon { font-size: 32px; margin-bottom: 8px; }

    /* FAB */
    .fab {
      position: fixed;
      bottom: 28px;
      right: calc(50% - 215px + 20px);
      width: 56px; height: 56px;
      background: var(--indigo);
      color: white;
      border: none;
      border-radius: 50%;
      font-size: 26px;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(59,63,140,0.35);
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.15s;
      z-index: 200;
    }
    .fab:active { transform: scale(0.92); }

    /* MODAL OVERLAY */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(30,32,64,0.4);
      z-index: 300;
      display: flex;
      align-items: flex-end;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    .modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }
    .modal {
      background: var(--white);
      width: 100%;
      max-width: 430px;
      margin: 0 auto;
      border-radius: 24px 24px 0 0;
      padding: 20px 20px 40px;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(.4,0,.2,1);
    }
    .modal-overlay.open .modal { transform: translateY(0); }

    .modal-handle {
      width: 36px; height: 4px;
      background: var(--gray-2);
      border-radius: 4px;
      margin: 0 auto 18px;
    }
    .modal-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--indigo);
      margin-bottom: 18px;
    }
    .form-group { margin-bottom: 14px; }
    .form-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--gray-4);
      margin-bottom: 6px;
      display: block;
    }
    .form-input {
      width: 100%;
      border: 1.5px solid var(--gray-2);
      border-radius: 10px;
      padding: 11px 14px;
      font-size: 15px;
      font-family: inherit;
      color: var(--text);
      background: var(--gray-1);
      outline: none;
      transition: border-color 0.15s;
    }
    .form-input:focus { border-color: var(--indigo); background: white; }
    .form-row { display: flex; gap: 10px; }
    .form-row .form-group { flex: 1; }

    /* COLOR PICKER */
    .color-picker {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .color-opt {
      width: 28px; height: 28px;
      border-radius: 50%;
      cursor: pointer;
      border: 3px solid transparent;
      transition: border-color 0.15s, transform 0.1s;
    }
    .color-opt.selected {
      border-color: var(--text);
      transform: scale(1.15);
    }

    .submit-btn {
      width: 100%;
      background: var(--indigo);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 15px;
      font-size: 16px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.15s;
    }
    .submit-btn:active { background: var(--indigo-light); }

    /* TOAST */
    .toast {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--text);
      color: white;
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
      opacity: 0;
      transition: all 0.3s;
      pointer-events: none;
      white-space: nowrap;
      z-index: 400;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* HOLIDAY CARD */
    .event-card.holiday-card {
      background: #FFF5F5;
      border-left: none;
    }
    .event-card.holiday-card .event-title-text { color: #C0392B; }

    /* PARTICIPANTS */
    .participants {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      padding: 0 16px 12px;
    }
    .participant-chip {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 5px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      color: white;
    }
    .participant-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: rgba(255,255,255,0.6);
    }
  </style>
  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, push, remove, onValue, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBrzd-J4rFACVwpigBuYp0eqapmk2MKm2k",
      authDomain: "calander-2c4b8.firebaseapp.com",
      databaseURL: "https://calander-2c4b8-default-rtdb.firebaseio.com/",
      projectId: "calander-2c4b8",
      storageBucket: "calander-2c4b8.firebasestorage.app",
      messagingSenderId: "236637654571",
      appId: "1:236637654571:web:427c587b20cfefb1d2e46e",
      measurementId: "G-ZT8E4JMXRZ"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const eventsRef = ref(db, 'events');

    // 전역에 노출 (일반 script 태그에서 사용하기 위함)
    window.__firebase = {
      db, eventsRef, push, remove, onValue, set,
      refChild: (path) => ref(db, path)
    };
  </script>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="app-title">함께<span>캘린더</span></div>
    <button class="share-btn" onclick="copyLink()">🔗 링크 공유</button>
  </div>
  <div class="sync-badge" id="syncBadge" style="margin-bottom:10px;">
    <div class="sync-dot offline" id="syncDot"></div>
    <span id="syncText">연결 중...</span>
  </div>
  <div class="month-nav">
    <button class="nav-btn" onclick="changeMonth(-1)">‹</button>
    <div class="month-label" id="monthLabel"></div>
    <button class="nav-btn" onclick="changeMonth(1)">›</button>
  </div>
</div>

<div class="weekdays">
  <div class="weekday sun">일</div>
  <div class="weekday">월</div>
  <div class="weekday">화</div>
  <div class="weekday">수</div>
  <div class="weekday">목</div>
  <div class="weekday">금</div>
  <div class="weekday sat">토</div>
</div>

<div class="calendar-grid" id="calendarGrid"></div>

<div id="participantsBar" class="participants"></div>

<div class="section">
  <div class="section-title" id="eventListTitle">이번 달 일정</div>
  <div class="event-list" id="eventList"></div>
</div>

<button class="fab" onclick="openModal()">+</button>

<!-- ADD MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">📅 일정 추가</div>

    <div class="form-group">
      <label class="form-label">이름</label>
      <input class="form-input" id="inputName" type="text" placeholder="내 이름을 입력하세요" maxlength="10">
    </div>

    <div class="form-group">
      <label class="form-label">일정 제목</label>
      <input class="form-input" id="inputTitle" type="text" placeholder="어떤 일정인가요?" maxlength="30">
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">날짜</label>
        <input class="form-input" id="inputDate" type="date">
      </div>
      <div class="form-group">
        <label class="form-label">시간 (선택)</label>
        <input class="form-input" id="inputTime" type="time">
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">메모 (선택)</label>
      <input class="form-input" id="inputDesc" type="text" placeholder="간단한 메모" maxlength="50">
    </div>

    <div class="form-group">
      <label class="form-label">색상 선택</label>
      <div class="color-picker" id="colorPicker"></div>
    </div>

    <button class="submit-btn" onclick="addEvent()">일정 추가하기</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const COLORS = [
    { hex: '#3B3F8C', name: '인디고' },
    { hex: '#4ECDC4', name: '민트' },
    { hex: '#E05C5C', name: '레드' },
    { hex: '#F4A261', name: '오렌지' },
    { hex: '#5C7AE0', name: '블루' },
    { hex: '#8B5CF6', name: '보라' },
    { hex: '#10B981', name: '그린' },
    { hex: '#F59E0B', name: '옐로우' },
  ];

  let selectedColor = COLORS[0].hex;
  let currentYear, currentMonth;
  let selectedDate = null;
  let events = [];
  let firebaseReady = false;

  // ── Firebase 실시간 동기화 ──────────────────────────────
  function setupFirebaseSync() {
    const fb = window.__firebase;
    if (!fb) {
      setSyncStatus(false, '동기화 불가');
      return;
    }
    fb.onValue(fb.eventsRef, (snapshot) => {
      const data = snapshot.val();
      events = data ? Object.entries(data).map(([id, ev]) => ({ id, ...ev })) : [];
      firebaseReady = true;
      setSyncStatus(true, '실시간 동기화 중');
      render();
    }, (error) => {
      console.error('Firebase sync error:', error);
      setSyncStatus(false, '연결 실패');
    });
  }

  function setSyncStatus(online, text) {
    const dot = document.getElementById('syncDot');
    const label = document.getElementById('syncText');
    if (!dot || !label) return;
    dot.classList.toggle('offline', !online);
    label.textContent = text;
  }

  function addEventToFirebase(ev) {
    const fb = window.__firebase;
    if (!fb) return;
    fb.push(fb.eventsRef, ev);
  }

  function removeEventFromFirebase(id) {
    const fb = window.__firebase;
    if (!fb || !fb.refChild) return;
    fb.remove(fb.refChild('events/' + id));
  }
  // ────────────────────────────────────────────────────────

  // ── 한국 공휴일 ──────────────────────────────────────────
  // 고정 공휴일 (MM-DD)
  const FIXED_HOLIDAYS = {
    '01-01': '새해',
    '03-01': '삼일절',
    '05-05': '어린이날',
    '06-06': '현충일',
    '08-15': '광복절',
    '10-03': '개천절',
    '10-09': '한글날',
    '12-25': '크리스마스',
  };

  // 음력 기반 공휴일: 연도별로 미리 계산된 양력 날짜 (2020~2030)
  const LUNAR_HOLIDAYS = {
    // 설날 연휴 (설날 전날·당일·다음날)
    '2024': { lunar: [['2024-02-09','설날 전날'],['2024-02-10','설날'],['2024-02-11','설날 다음날'],['2024-02-12','대체공휴일'],['2024-04-10','국회의원선거일'],['2024-05-15','부처님오신날'],['2024-09-16','추석 전날'],['2024-09-17','추석'],['2024-09-18','추석 다음날']] },
    '2025': { lunar: [['2025-01-28','설날 전날'],['2025-01-29','설날'],['2025-01-30','설날 다음날'],['2025-05-05','부처님오신날'],['2025-10-05','추석 전날'],['2025-10-06','추석'],['2025-10-07','추석 다음날'],['2025-10-08','대체공휴일']] },
    '2026': { lunar: [['2026-02-16','설날 전날'],['2026-02-17','설날'],['2026-02-18','설날 다음날'],['2026-05-24','부처님오신날'],['2026-09-24','추석 전날'],['2026-09-25','추석'],['2026-09-26','추석 다음날']] },
    '2027': { lunar: [['2027-02-05','설날 전날'],['2027-02-06','설날'],['2027-02-07','설날 다음날'],['2027-05-13','부처님오신날'],['2027-09-14','추석 전날'],['2027-09-15','추석'],['2027-09-16','추석 다음날']] },
    '2028': { lunar: [['2028-01-26','설날 전날'],['2028-01-27','설날'],['2028-01-28','설날 다음날'],['2028-05-02','부처님오신날'],['2028-10-02','추석 전날'],['2028-10-03','추석'],['2028-10-04','추석 다음날']] },
  };

  function getHoliday(dateStr) {
    const [y, m, d] = dateStr.split('-');
    const mmdd = `${m}-${d}`;
    if (FIXED_HOLIDAYS[mmdd]) return FIXED_HOLIDAYS[mmdd];
    const yearData = LUNAR_HOLIDAYS[y];
    if (yearData) {
      const found = yearData.lunar.find(h => h[0] === dateStr);
      if (found) return found[1];
    }
    return null;
  }
  // ────────────────────────────────────────────────────────

  function init() {
    const now = new Date();
    currentYear = now.getFullYear();
    currentMonth = now.getMonth();
    selectedDate = formatDate(now);
    buildColorPicker();
    document.getElementById('inputDate').value = selectedDate;
    render();

    // Firebase 모듈 스크립트가 로드될 때까지 약간의 지연 후 동기화 시작
    setTimeout(setupFirebaseSync, 300);
  }

  function formatDate(d) {
    const y = d.getFullYear();
    const m = String(d.getMonth()+1).padStart(2,'0');
    const dd = String(d.getDate()).padStart(2,'0');
    return `${y}-${m}-${dd}`;
  }

  function buildColorPicker() {
    const cp = document.getElementById('colorPicker');
    cp.innerHTML = '';
    COLORS.forEach(c => {
      const el = document.createElement('div');
      el.className = 'color-opt' + (c.hex === selectedColor ? ' selected' : '');
      el.style.background = c.hex;
      el.onclick = () => {
        selectedColor = c.hex;
        document.querySelectorAll('.color-opt').forEach(o => o.classList.remove('selected'));
        el.classList.add('selected');
      };
      cp.appendChild(el);
    });
  }

  function changeMonth(dir) {
    currentMonth += dir;
    if (currentMonth > 11) { currentMonth = 0; currentYear++; }
    if (currentMonth < 0) { currentMonth = 11; currentYear--; }
    render();
  }

  function render() {
    renderMonth();
    renderGrid();
    renderParticipants();
    renderEventList();
  }

  function renderMonth() {
    const months = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
    document.getElementById('monthLabel').textContent = `${currentYear}년 ${months[currentMonth]}`;
  }

  function renderGrid() {
    const grid = document.getElementById('calendarGrid');
    grid.innerHTML = '';
    const today = formatDate(new Date());
    const firstDay = new Date(currentYear, currentMonth, 1).getDay();
    const daysInMonth = new Date(currentYear, currentMonth+1, 0).getDate();
    const daysInPrev = new Date(currentYear, currentMonth, 0).getDate();

    // prev month fill
    for (let i = firstDay - 1; i >= 0; i--) {
      const d = daysInPrev - i;
      const cell = makeDayCell(d, currentYear, currentMonth - 1, true, today);
      grid.appendChild(cell);
    }
    // current month
    for (let d = 1; d <= daysInMonth; d++) {
      const cell = makeDayCell(d, currentYear, currentMonth, false, today);
      grid.appendChild(cell);
    }
    // next month fill
    const total = firstDay + daysInMonth;
    const remaining = total % 7 === 0 ? 0 : 7 - (total % 7);
    for (let d = 1; d <= remaining; d++) {
      const cell = makeDayCell(d, currentYear, currentMonth + 1, true, today);
      grid.appendChild(cell);
    }
  }

  function makeDayCell(d, y, m, otherMonth, today) {
    const adjM = ((m % 12) + 12) % 12;
    const adjY = m < 0 ? y - 1 : m > 11 ? y + 1 : y;
    const dateStr = `${adjY}-${String(adjM+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dow = new Date(adjY, adjM, d).getDay();

    const cell = document.createElement('div');
    const holiday = getHoliday(dateStr);
    cell.className = 'day-cell'
      + (otherMonth ? ' other-month' : '')
      + (dateStr === today ? ' today' : '')
      + (dow === 0 || holiday ? ' sun' : '')
      + (dow === 6 ? ' sat' : '')
      + (holiday ? ' holiday' : '');

    const numEl = document.createElement('div');
    numEl.className = 'day-num';
    numEl.textContent = d;
    cell.appendChild(numEl);

    // 공휴일 이름 표시
    if (holiday && !otherMonth) {
      const hlEl = document.createElement('div');
      hlEl.className = 'holiday-label';
      hlEl.textContent = holiday;
      cell.appendChild(hlEl);
    }

    // dots
    const dayEvents = events.filter(e => e.date === dateStr);
    if (dayEvents.length > 0) {
      const dots = document.createElement('div');
      dots.className = 'event-dots';
      dayEvents.slice(0,4).forEach(ev => {
        const dot = document.createElement('div');
        dot.className = 'event-dot';
        dot.style.background = ev.color;
        dots.appendChild(dot);
      });
      cell.appendChild(dots);
    }

    cell.onclick = () => {
      selectedDate = dateStr;
      document.getElementById('inputDate').value = dateStr;
      renderEventList();
      // highlight
      document.querySelectorAll('.day-cell').forEach(c => c.style.background='');
      cell.style.background = 'var(--lavender)';
    };
    return cell;
  }

  function renderParticipants() {
    const bar = document.getElementById('participantsBar');
    const names = {};
    events.forEach(e => { if (e.name) names[e.name] = e.color; });
    if (Object.keys(names).length === 0) { bar.innerHTML = ''; return; }
    bar.innerHTML = '';
    Object.entries(names).forEach(([name, color]) => {
      const chip = document.createElement('div');
      chip.className = 'participant-chip';
      chip.style.background = color;
      chip.innerHTML = `<div class="participant-dot"></div>${name}`;
      bar.appendChild(chip);
    });
  }

  function renderEventList() {
    const list = document.getElementById('eventList');
    const title = document.getElementById('eventListTitle');
    let filtered;
    if (selectedDate) {
      const d = new Date(selectedDate + 'T00:00:00');
      const mo = d.getMonth();
      const yr = d.getFullYear();
      if (mo === currentMonth && yr === currentYear) {
        filtered = events.filter(e => e.date === selectedDate);
        const [y,m,dd] = selectedDate.split('-');
        title.textContent = `${parseInt(m)}월 ${parseInt(dd)}일 일정`;
      } else {
        filtered = events.filter(e => e.date.startsWith(`${currentYear}-${String(currentMonth+1).padStart(2,'0')}`));
        const months = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
        title.textContent = `${months[currentMonth]} 일정`;
      }
    } else {
      filtered = events.filter(e => e.date.startsWith(`${currentYear}-${String(currentMonth+1).padStart(2,'0')}`));
    }

    filtered.sort((a,b) => (a.date+a.time) > (b.date+b.time) ? 1 : -1);

    // 선택된 날 또는 해당 월의 공휴일도 함께 표시
    let holidayItems = [];
    if (selectedDate) {
      const d2 = new Date(selectedDate + 'T00:00:00');
      if (d2.getMonth() === currentMonth && d2.getFullYear() === currentYear) {
        const h = getHoliday(selectedDate);
        if (h) holidayItems.push({ date: selectedDate, title: h, isHoliday: true });
      }
    } else {
      const daysInM = new Date(currentYear, currentMonth+1, 0).getDate();
      for (let dd = 1; dd <= daysInM; dd++) {
        const ds = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(dd).padStart(2,'0')}`;
        const h = getHoliday(ds);
        if (h) holidayItems.push({ date: ds, title: h, isHoliday: true });
      }
    }

    if (filtered.length === 0 && holidayItems.length === 0) {
      list.innerHTML = `<div class="empty-state"><div class="empty-icon">📭</div>등록된 일정이 없어요<br><small style="font-size:12px;margin-top:4px;display:block">+ 버튼으로 일정을 추가해보세요</small></div>`;
      return;
    }

    list.innerHTML = '';

    // 공휴일 카드 먼저
    holidayItems.forEach(h => {
      const card = document.createElement('div');
      card.className = 'event-card holiday-card';
      const [hy,hm,hd] = h.date.split('-');
      card.innerHTML = `
        <div class="event-color-bar" style="background:#E05C5C"></div>
        <div class="event-info">
          <div class="event-title-text">🇰🇷 ${h.title}</div>
          <div class="event-meta">
            <span class="event-name-tag" style="background:#E05C5C">공휴일</span>
            <span class="event-time">${parseInt(hm)}월 ${parseInt(hd)}일</span>
          </div>
        </div>
      `;
      list.appendChild(card);
    });

    filtered.forEach(ev => {
      const card = document.createElement('div');
      card.className = 'event-card';
      card.innerHTML = `
        <div class="event-color-bar" style="background:${ev.color}"></div>
        <div class="event-info">
          <div class="event-title-text">${ev.title}</div>
          <div class="event-meta">
            <span class="event-name-tag" style="background:${ev.color}">${ev.name}</span>
            ${ev.time ? `<span class="event-time">🕐 ${ev.time}</span>` : ''}
            ${filtered === events ? `<span class="event-time">${ev.date}</span>` : ''}
          </div>
          ${ev.desc ? `<div class="event-desc">${ev.desc}</div>` : ''}
        </div>
        <button class="event-delete" onclick="deleteEvent('${ev.id}')">×</button>
      `;
      list.appendChild(card);
    });
  }

  function openModal() {
    document.getElementById('modalOverlay').classList.add('open');
    setTimeout(() => document.getElementById('inputName').focus(), 300);
  }

  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('open');
  }

  function handleOverlayClick(e) {
    if (e.target === document.getElementById('modalOverlay')) closeModal();
  }

  function addEvent() {
    const name = document.getElementById('inputName').value.trim();
    const title = document.getElementById('inputTitle').value.trim();
    const date = document.getElementById('inputDate').value;
    const time = document.getElementById('inputTime').value;
    const desc = document.getElementById('inputDesc').value.trim();

    if (!name) { showToast('이름을 입력해주세요'); return; }
    if (!title) { showToast('일정 제목을 입력해주세요'); return; }
    if (!date) { showToast('날짜를 선택해주세요'); return; }

    const ev = {
      name, title, date, time, desc,
      color: selectedColor
    };
    addEventToFirebase(ev);
    closeModal();
    selectedDate = date;
    const d = new Date(date + 'T00:00:00');
    currentYear = d.getFullYear();
    currentMonth = d.getMonth();
    showToast('✅ 일정이 추가됐어요!');
    document.getElementById('inputTitle').value = '';
    document.getElementById('inputTime').value = '';
    document.getElementById('inputDesc').value = '';
  }

  function deleteEvent(id) {
    removeEventFromFirebase(id);
    showToast('일정이 삭제됐어요');
  }

  function copyLink() {
    const url = window.location.href;
    if (navigator.clipboard) {
      navigator.clipboard.writeText(url).then(() => showToast('🔗 링크가 복사됐어요!'));
    } else {
      const el = document.createElement('textarea');
      el.value = url;
      document.body.appendChild(el);
      el.select();
      document.execCommand('copy');
      document.body.removeChild(el);
      showToast('🔗 링크가 복사됐어요!');
    }
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  init();
</script>
</body>
